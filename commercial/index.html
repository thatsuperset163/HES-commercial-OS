<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HES Commercial Card — Print</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/brand.css" />
    <style>
      /* Default: 5" × 10" landscape leave-behind */
      .card {
        --card-w: 10in;
        --card-h: 5in;
        width: var(--card-w);
        height: var(--card-h);
        position: relative;
        overflow: hidden;
        background: var(--cream);
        box-shadow: 0 8px 28px rgba(11, 35, 64, 0.18);
        display: flex;
      }

      body.size-half .card {
        --card-w: 8.5in;
        --card-h: 5.5in;
      }

      body.size-letter .card {
        --card-w: 11in;
        --card-h: 8.5in;
      }

      .card-front,
      .card-back {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: 1.05fr 1fr;
      }

      .card-back {
        grid-template-columns: 1fr 1.15fr;
        background: var(--white);
      }

      .panel-brand {
        background: var(--navy);
        color: var(--white);
        padding: 0.35in 0.32in;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .logo-tiny {
        width: 1.55in;
        display: block;
        opacity: 0.95;
        margin-bottom: 0.15in;
      }

      .intro h2 {
        margin: 0 0 0.12in;
        font-size: 13pt;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        line-height: 1.2;
      }

      .intro p {
        margin: 0;
        font-size: 9.5pt;
        font-weight: 500;
        line-height: 1.4;
        color: #d7e2ea;
        max-width: 3.4in;
      }

      .svc-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.08in;
        margin-top: 0.18in;
      }

      .svc-row span {
        font-size: 7.5pt;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1pt solid rgba(255, 255, 255, 0.35);
        padding: 0.05in 0.08in;
      }

      .creds-line {
        font-size: 8pt;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #9fd0ae;
      }

      .panel-contact {
        padding: 0.35in 0.32in;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: var(--cream);
      }

      .kicker {
        font-size: 9pt;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--green);
        margin: 0 0 0.12in;
      }

      .phone-block {
        background: var(--navy);
        color: var(--white);
        padding: 0.2in 0.18in;
        margin-bottom: 0.14in;
        text-align: center;
      }

      .phone {
        display: block;
        font-size: 26pt;
        font-weight: 800;
        letter-spacing: 0.02em;
        line-height: 1;
        margin-bottom: 0.08in;
      }

      .cta {
        display: block;
        font-size: 11pt;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #b8e0c4;
      }

      .web {
        text-align: center;
        font-size: 11pt;
        font-weight: 700;
        letter-spacing: 0.03em;
        margin: 0 0 0.18in;
      }

      .front-note {
        margin: 0;
        text-align: center;
        font-size: 9pt;
        font-weight: 600;
        line-height: 1.35;
        color: #334;
      }

      /* Back — Things we noticed */
      .panel-noticed {
        background: var(--navy);
        color: var(--white);
        padding: 0.32in 0.3in;
        display: flex;
        flex-direction: column;
      }

      .panel-noticed h2 {
        margin: 0 0 0.06in;
        font-size: 16pt;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .panel-noticed .sub {
        margin: 0 0 0.18in;
        font-size: 9pt;
        font-weight: 500;
        color: #c5d4df;
        line-height: 1.35;
      }

      .lines {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.28in;
        margin-bottom: 0.18in;
      }

      .lines .line {
        border-bottom: 1.25pt solid rgba(255, 255, 255, 0.45);
        min-height: 0.22in;
      }

      .write-hint {
        margin: 0;
        font-size: 7.5pt;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9fd0ae;
      }

      .panel-offer {
        padding: 0.32in 0.3in;
        display: flex;
        flex-direction: column;
        background: var(--cream);
      }

      .panel-offer h3 {
        margin: 0 0 0.08in;
        font-size: 12pt;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--navy);
      }

      .offer-box {
        border: 2.5pt solid var(--green);
        padding: 0.14in;
        margin-bottom: 0.16in;
        min-height: 1.15in;
      }

      .offer-box .label {
        font-size: 8pt;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--green);
        margin-bottom: 0.1in;
      }

      .offer-box .blank {
        border-bottom: 1pt solid var(--line);
        height: 0.28in;
        margin-bottom: 0.12in;
      }

      .mini-contact {
        margin-top: auto;
        text-align: center;
        padding-top: 0.12in;
        border-top: 1.5pt solid var(--line);
      }

      .mini-contact .phone {
        font-size: 16pt;
        color: var(--navy);
        margin-bottom: 0.04in;
      }

      .mini-contact .cta {
        color: var(--green);
        font-size: 9pt;
        margin-bottom: 0.06in;
      }

      .mini-contact .web {
        font-size: 9pt;
        margin: 0;
      }

      .logo-corner {
        width: 1.1in;
        margin: 0 auto 0.1in;
        display: block;
        opacity: 0.9;
      }

      .pair {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
      }

      .label-cap {
        text-align: center;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 0.4rem;
        color: #445;
      }

      .size-switch {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 0.75rem;
      }

      .size-switch button {
        appearance: none;
        border: 1.5px solid var(--navy);
        background: var(--white);
        color: var(--navy);
        font: inherit;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 0.45rem 0.7rem;
        border-radius: 4px;
        cursor: pointer;
      }

      .size-switch button.active {
        background: var(--green);
        border-color: var(--green);
        color: white;
      }

      .sheet {
        width: 11in;
        height: 8.5in;
        page-break-after: always;
        break-after: page;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      body.size-5x10 .sheet {
        /* letter landscape */
      }

      body.size-half .sheet {
        width: 8.5in;
        height: 11in;
      }

      body.size-letter .sheet {
        width: 11in;
        height: 8.5in;
      }

      .sheet .card {
        box-shadow: none;
      }

      .crop {
        position: absolute;
        width: 0.18in;
        height: 0.18in;
        border-color: #888;
        border-style: solid;
        pointer-events: none;
      }

      .crop.tl {
        top: calc(50% - 2.5in - 0.12in);
        left: calc(50% - 5in - 0.12in);
        border-width: 0.75pt 0 0 0.75pt;
      }

      .crop.tr {
        top: calc(50% - 2.5in - 0.12in);
        right: calc(50% - 5in - 0.12in);
        border-width: 0.75pt 0.75pt 0 0;
      }

      .crop.bl {
        bottom: calc(50% - 2.5in - 0.12in);
        left: calc(50% - 5in - 0.12in);
        border-width: 0 0 0.75pt 0.75pt;
      }

      .crop.br {
        bottom: calc(50% - 2.5in - 0.12in);
        right: calc(50% - 5in - 0.12in);
        border-width: 0 0.75pt 0.75pt 0;
      }

      body.size-half .crop,
      body.size-letter .crop {
        display: none;
      }

      @page {
        size: letter landscape;
        margin: 0;
      }

      body.size-half {
        /* half-letter vertical stack print */
      }

      @media print {
        body.size-half {
          /* switch page to portrait for half sheets */
        }
      }
    </style>
  </head>
  <body class="size-5x10">
    <header class="toolbar screen-only">
      <h1>Commercial leave-behind</h1>
      <p>
        Landscape card. Default is your <strong>5&quot; × 10&quot;</strong> size centered
        on letter landscape with crop marks. Front = who you are. Back =
        <strong>Things we noticed</strong> write-in lines + offer box. Print
        double-sided, flip on <strong>short edge</strong> for landscape.
      </p>
      <div class="size-switch" role="group" aria-label="Card size">
        <button type="button" class="active" data-size="size-5x10">
          5×10 (your size)
        </button>
        <button type="button" data-size="size-half">8.5×5.5 (easy home cut)</button>
        <button type="button" data-size="size-letter">Full letter landscape</button>
      </div>
      <div class="actions">
        <button class="btn" type="button" onclick="window.print()">Print</button>
        <a class="btn secondary" href="../door-hanger/index.html">Door hanger</a>
        <a class="btn secondary" href="../index.html">All pieces</a>
      </div>
    </header>

    <div class="preview-wrap screen-only">
      <div class="pair">
        <div>
          <div class="label-cap">Front</div>
          <div id="preview-front"></div>
        </div>
        <div>
          <div class="label-cap">Back — Things we noticed</div>
          <div id="preview-back"></div>
        </div>
      </div>
    </div>

    <div class="sheet print-only" id="sheet-front"></div>
    <div class="sheet print-only" id="sheet-back"></div>

    <template id="tpl-front">
      <article class="card card-front">
        <section class="panel-brand">
          <div>
            <img
              class="logo-tiny"
              src="../assets/logo-lockup-white.svg"
              alt="Harris Exterior Solutions"
            />
            <div class="intro">
              <h2>Exterior cleaning<br />for local businesses</h2>
              <p>
                I’m William with Harris Exterior Solutions — Winston-Salem &amp;
                Triad. I keep storefronts, offices, and restaurants looking sharp
                with pressure washing, window cleaning, and junk removal.
              </p>
              <div class="svc-row">
                <span>Pressure washing</span>
                <span>Window cleaning</span>
                <span>Junk removal</span>
              </div>
            </div>
          </div>
          <p class="creds-line">Local · Licensed · Insured</p>
        </section>
        <section class="panel-contact">
          <p class="kicker">Saw something that needs attention?</p>
          <div class="phone-block">
            <a class="phone" href="tel:3369868371">(336) 986-8371</a>
            <span class="cta">Free quote at harrisexteriorsolutions.com</span>
          </div>
          <p class="web">www.harrisexteriorsolutions.com</p>
          <p class="front-note">
            Flip this card — I left notes on what stood out at your property
            and a simple offer to get started.
          </p>
        </section>
      </article>
    </template>

    <template id="tpl-back">
      <article class="card card-back">
        <section class="panel-noticed">
          <h2>Things we noticed</h2>
          <p class="sub">
            Walked your property today. Notes below — happy to quote any of
            these items.
          </p>
          <div class="lines" aria-hidden="true">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
          </div>
          <p class="write-hint">Write with ballpoint · Press firmly</p>
        </section>
        <section class="panel-offer">
          <img
            class="logo-corner"
            src="../assets/logo-lockup.svg"
            alt=""
          />
          <h3>Your offer</h3>
          <div class="offer-box">
            <div class="label">Fill in before you hand it off</div>
            <div class="blank"></div>
            <div class="blank"></div>
            <div class="blank"></div>
          </div>
          <div class="mini-contact">
            <a class="phone" href="tel:3369868371">(336) 986-8371</a>
            <div class="cta">Free quote at harrisexteriorsolutions.com</div>
            <p class="web">www.harrisexteriorsolutions.com</p>
          </div>
        </section>
      </article>
    </template>

    <script>
      function clone(id) {
        return document.getElementById(id).content.cloneNode(true);
      }

      function mount(el, tpl) {
        el.innerHTML = "";
        el.appendChild(clone(tpl));
      }

      function fill() {
        mount(document.getElementById("preview-front"), "tpl-front");
        mount(document.getElementById("preview-back"), "tpl-back");

        const sf = document.getElementById("sheet-front");
        const sb = document.getElementById("sheet-back");
        sf.innerHTML = "";
        sb.innerHTML = "";
        sf.appendChild(clone("tpl-front"));
        sb.appendChild(clone("tpl-back"));

        if (document.body.classList.contains("size-5x10")) {
          ["tl", "tr", "bl", "br"].forEach((c) => {
            sf.insertAdjacentHTML(
              "beforeend",
              `<div class="crop ${c}"></div>`
            );
            sb.insertAdjacentHTML(
              "beforeend",
              `<div class="crop ${c}"></div>`
            );
          });
        }
      }

      document.querySelectorAll(".size-switch button").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.body.classList.remove("size-5x10", "size-half", "size-letter");
          document.body.classList.add(btn.dataset.size);
          document
            .querySelectorAll(".size-switch button")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          const style = document.getElementById("page-size-style");
          if (btn.dataset.size === "size-half") {
            style.textContent = "@page { size: letter portrait; margin: 0; }";
          } else {
            style.textContent = "@page { size: letter landscape; margin: 0; }";
          }
          fill();
        });
      });

      fill();
    </script>
    <style id="page-size-style">
      @page {
        size: letter landscape;
        margin: 0;
      }
    </style>
  </body>
</html>
